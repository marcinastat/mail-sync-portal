[Definition]
# Format logu zależy od wersji Roundcube (userlogins log, config.inc.php:
# log_driver=file, userlogins=true) — dopasowanie poniżej pokrywa standardowy
# format Roundcube 1.6/1.7. Jeśli po wdrożeniu regex nie łapie realnych
# wpisów, sprawdź /var/log/roundcube/userlogins i dopasuj wzorzec.
failregex = Failed login for .* from <HOST> in session
            IMAP Error.*Login failed for .*from <HOST>
ignoreregex =
