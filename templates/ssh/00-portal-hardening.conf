# Utwardzenie SSH (portal). Plik 00-* jest czytany PRZED innymi drop-inami
# (np. 01-permitrootlogin.conf z obrazu), a w sshd wygrywa PIERWSZA uzyskana
# wartosc — dlatego te ustawienia maja pierwszenstwo.
#
# Tylko klucze: root moze logowac sie wylacznie kluczem, logowanie haslem
# wylaczone calkowicie. WYMAGA wgranego klucza publicznego roota PRZED
# uruchomieniem instalacji (inaczej stracisz dostep po reloadzie sshd).
PermitRootLogin prohibit-password
PasswordAuthentication no
KbdInteractiveAuthentication no
