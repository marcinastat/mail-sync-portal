{% extends "auth_base.html" %}
{% block title %}Pierwsze uruchomienie — konto administratora{% endblock %}
{% block content %}
  <h2>Krok 1/5 — Konto administratora</h2>
  {% if error %}<p style="color:#dc2626">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/setup/account">
    <label for="username">Login</label>
    <input type="text" id="username" name="username" required autofocus>
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required>
    <label for="password">Hasło</label>
    <input type="password" id="password" name="password" minlength="12" required>
    <p style="margin-top:1.25rem">
      <button class="btn" type="submit" style="width:100%">Dalej</button>
    </p>
  </form>
{% endblock %}
