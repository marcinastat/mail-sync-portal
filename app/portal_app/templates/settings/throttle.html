{% extends "base.html" %}
{% block title %}Throttling — Ustawienia{% endblock %}
{% block content %}
  <h1>Throttling synchronizacji</h1>
  <div class="card">
    <form method="post" action="/admin/settings/throttle">
      <label for="max_connections_per_minute">Maks. połączeń / minutę</label>
      <input type="number" id="max_connections_per_minute" name="max_connections_per_minute" value="{{ policy.max_connections_per_minute }}" min="1">
      <label for="max_connections_per_hour">Maks. połączeń / godzinę</label>
      <input type="number" id="max_connections_per_hour" name="max_connections_per_hour" value="{{ policy.max_connections_per_hour }}" min="1">
      <label for="max_connections_per_day">Maks. połączeń / dzień</label>
      <input type="number" id="max_connections_per_day" name="max_connections_per_day" value="{{ policy.max_connections_per_day }}" min="1">
      <label for="concurrent_job_limit">Maks. równoległych synchronizacji</label>
      <input type="number" id="concurrent_job_limit" name="concurrent_job_limit" value="{{ policy.concurrent_job_limit }}" min="1">
      <p style="margin-top:1rem"><button class="btn" type="submit">Zapisz</button></p>
    </form>
  </div>
{% endblock %}
