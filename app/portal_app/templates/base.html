<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portal Poczty{% endblock %}</title>
  <link rel="stylesheet" href="/admin/static/css/tokens.css">
  <link rel="stylesheet" href="/admin/static/css/app.css">
  <script src="/admin/static/js/htmx.min.js" defer></script>
  <script src="/admin/static/js/alpine.min.js" defer></script>
</head>
<body>
  <div class="topbar">
    {% if branding and branding.logo_path %}
      <img class="logo" src="/admin/static/branding/{{ branding.logo_path }}" alt="logo">
    {% else %}
      <strong>Portal Poczty</strong>
    {% endif %}
    <div class="spacer"></div>
    {% if current_user %}
      <span>{{ current_user.username }}</span>
      <form method="post" action="/admin/logout" style="display:inline">
        <button class="btn secondary" type="submit">Wyloguj</button>
      </form>
    {% endif %}
  </div>
  <div class="layout">
    <div class="sidebar">
      <a href="/admin/" class="{{ 'active' if active == 'dashboard' }}">Pulpit</a>
      <a href="/admin/domains" class="{{ 'active' if active == 'domains' }}">Domeny</a>
      <a href="/admin/mailboxes" class="{{ 'active' if active == 'mailboxes' }}">Skrzynki</a>
      <a href="/admin/imports" class="{{ 'active' if active == 'imports' }}">Import XLS</a>
      <a href="/admin/audit" class="{{ 'active' if active == 'audit' }}">Audyt</a>
      <a href="/admin/reports" class="{{ 'active' if active == 'reports' }}">Raporty</a>
      <a href="/admin/settings" class="{{ 'active' if active == 'settings' }}">Ustawienia</a>
      <a href="/admin/docs" class="{{ 'active' if active == 'docs' }}">Dokumentacja</a>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
