{% extends "auth_base.html" %}
{% block title %}Kod TOTP — Portal Poczty{% endblock %}
{% block content %}
  <h2>Kod uwierzytelniający</h2>
  {% if error %}<p style="color:#dc2626">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login/totp">
    <label for="code">Kod z aplikacji (lub kod odzyskiwania)</label>
    <input type="text" id="code" name="code" required autofocus autocomplete="one-time-code">
    <p style="margin-top:1.25rem">
      <button class="btn" type="submit" style="width:100%">Zaloguj</button>
    </p>
  </form>
{% endblock %}
